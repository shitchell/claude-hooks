# generate-docs-index.conf — Configuration for the generate-docs-index hook
#
# Place this file at <project>/.claude/generate-docs-index.conf
# (or any parent directory — settings walk forward from ~ to $PWD).
#
# All values are optional. Defaults shown in comments.

# Directory to scan for markdown files with YAML frontmatter
#DOCS_DIR=docs

# Write output to a file instead of stdout.
# When unset, the index is printed to stdout (shown in Claude's session
# context). Set this to persist the index to disk, e.g. for committing.
#OUTPUT_FILE=docs/INDEX.md
